name: Docker Image CI

on:
  workflow_dispatch:

  push:
    branches:
      - master

  schedule:  
    - cron: '0 0 * * *'

jobs:

  build:

    runs-on: 'ubuntu-24.04-arm'

    steps:
    # 1️⃣ Clona tu fork (solo parches + Dockerfile)
    - name: Check Out Repo Fork
      uses: actions/checkout@v3
      with:
        path: custom-yt

    # 2️⃣ Clona el repo original de Invidious
    - name: Check Out Repo Invidious
      uses: actions/checkout@v3
      with:
        repository: "iv-org/invidious"
        ref: 'master'
        path: invidious

    # 3️⃣ Aplica los parches de tu fork al repo original
    - name: Patch invidious main repo
      run: |
        cd invidious
        git config --global user.email "you@example.com"
        git config --global user.name "Your Name"
        git am ../custom-yt/patches/*.patch
        sed -i 's|https://invidious.io/donate/|/donate|g' src/invidious/views/template.ecr

    # 4️⃣ Login a Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    # 5️⃣ Setup Buildx
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2

    # 6️⃣ Commit ID
    - name: Set up build commit id
      run: echo "commitid=$(cd invidious && git log --format="%H" -n 1)-$(git log --format="%H" -n 1)" >> $GITHUB_ENV

    # 7️⃣ Build y push de la imagen
    - name: Build and push alpine docker image
      id: docker_build_new
      uses: docker/build-push-action@v3
      with:
        context: ./invidious
        file: ./custom-yt/invidious/docker/Dockerfile.arm64
        build-args: |
            release=1
        platforms: linux/arm64/v8
        push: true
        tags: vigarpast777/invidious-custom:new-latest, vigarpast777/invidious-custom:new-build-${{ env.commitid }}
